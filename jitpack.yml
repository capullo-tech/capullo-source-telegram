# jitpack builds & publishes only the library module (the :app harness is dev-only).
# Resolves contracts + lib-tdlib-android (the TDLib prebuilt) from jitpack; the Android SDK is
# provided by jitpack. No setup_tdlib.sh / git-lfs anymore - TDLib is a normal jitpack dependency.
jdk:
  - openjdk17
install:
  - ./gradlew :capullo-source-telegram:publishToMavenLocal -x test -x lint
